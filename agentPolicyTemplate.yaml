# Canonical agent policy for NVIDIA AI Workbench project containers.
#
# This file is intentionally tool-agnostic. Adapter scripts translate this
# policy into Claude and Codex configuration files.
#
# Workbench container conventions:
# - Home directory: /home/workbench
# - Project repository: /project
# - Agent config repository: /home/workbench/nvwb-agent-config

profile: ai-workbench-container

# Managed-settings stance installed by onStart.bash:
#   bypassBlocked  - lock out the bypass/auto permission modes (recommended)
#   bypassAllowed  - permit them (more permissive)
managed_settings_controls: bypassBlocked

workbench:
  home: /home/workbench
  project: /project
  agent_config_repo: /home/workbench/nvwb-agent-config
  cache_dir: /home/workbench/cache-config

paths:
  # Paths agents may read and modify.
  write:
    - /project
    - /tmp

  # Paths agents may read but should not modify.
  read_only:
    - /project/.project
    - /home/workbench/.agents
    - /home/workbench/nvwb-agent-config
    - /home/workbench/cache-config
    - /project/onStart.bash
    - /project/agentPolicyConfig.yaml

  # Paths agents should neither read nor modify.
  private:
    - /home/workbench/.claude.json
    - /home/workbench/.claude/.claude.json
    - /home/workbench/.claude/credentials.json
    - /home/workbench/.codex/auth.json

  # Sensitive project-relative patterns.
  private_project_patterns:
    - "**/*.pem"


commands:
  # Commands that require explicit user confirmation.
  ask:
    - git add
    - git commit
    - git rm
    - git config

  # Commands that should be blocked in the running Workbench container.
  deny:
    - rm -rf
    - sudo
    - pip install
    - pip3 install
    - python -m pip install
    - python3 -m pip install
    - docker
    - podman
    - nvwb

environment:
  # Workbench sensitive variable names are versioned in /project/.project/spec.yaml,
  # but their values are injected into the running container environment.
  #
  # Adapter expectations:
  # - Do not pass matching variables to agent-launched shell commands.
  # - Redact matching values from hook output, logs, and generated context.
  # - Treat names listed as Workbench secrets as private even if they do not
  #   match one of the patterns below.
  # - Do not ask the agent to discover, print, summarize, or persist values.
  exclude_from_agent_processes: true
  redact_in_outputs: true
  include_workbench_sensitive_variables: true

  private_names:
    - NVIDIA_API_KEY
    - OPENAI_API_KEY
    - GITHUB_TOKEN

  private_patterns:
    - AWS_*
    - AZURE_*
    - GCP_*
    - GOOGLE_*
    - "*_TOKEN"
    - "*_SECRET"
    - "*_KEY"
    - "*PASSWORD*"
