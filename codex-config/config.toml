# Codex defaults for NVIDIA AI Workbench project containers.
# Keep this file suitable for symlinking to ~/.codex/config.toml.

model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "high"
model_verbosity = "medium"
personality = "pragmatic"

approval_policy = "on-request"
approvals_reviewer = "user"
allow_login_shell = false

# Use the modern permission-profile system instead of legacy sandbox_workspace_write.
default_permissions = "nvwb_workspace"

web_search = "cached"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md"]

cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "auto"

[permissions.nvwb_workspace]
description = "Workspace editing for AI Workbench projects with agent state and credentials protected."
extends = ":workspace"

[permissions.nvwb_workspace.workspace_roots]
"/project" = true

[permissions.nvwb_workspace.filesystem]
glob_scan_max_depth = 4
"~/.codex" = "read"
"~/.agents" = "read"
"~/codex_audit_logs" = "write"

[permissions.nvwb_workspace.filesystem.":workspace_roots"]
"." = "write"
".codex" = "read"
".agents" = "read"
".project" = "read"

[permissions.nvwb_workspace.network]
enabled = false

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
exclude = [
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "NVIDIA_API_KEY",
  "OPENAI_API_KEY",
  "GITHUB_TOKEN",
  "*_TOKEN",
  "*_SECRET",
  "*_KEY",
  "*PASSWORD*",
]

[history]
persistence = "save-all"

[tui]
notifications = false

[features]
hooks = true
shell_snapshot = true
multi_agent = true
